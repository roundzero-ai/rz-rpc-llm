# ==============================================================================
# rz-rpc-llm Model Registry
# Add new models by adding a new [section]. No code changes needed.
# Section names are matched case-insensitively (e.g., --model qwen3.5 or QWEN3.5).
# ==============================================================================

[minimax-m2.5]
display_name = MiniMax-M2.5
repo = unsloth/MiniMax-M2.5-GGUF
pattern = *UD-Q6_K_XL*
file = UD-Q6_K_XL/MiniMax-M2.5-UD-Q6_K_XL-00001-of-00005.gguf
alias = minimax-m2.5
default_mode = distributed
solo = no
vision = no
threads = 14
threads_batch = 14
ctx_size = 131072
parallel = 2
batch_size = 2048
ubatch_size = 512
n_gpu_layers = all
split_mode = layer
tensor_split = 2,3
cache_type_k = q8_0
cache_type_v = q8_0
temp = 1.0
top_p = 0.95
top_k = 40
min_p = 0.01
repeat_penalty = 1.0
presence_penalty = 0.0
reasoning_format = auto

